<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隢?蝟餌絞???皜祈岫</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #cbd5e1;
      --text: #0f172a;
      --ok: #166534;
      --err: #b91c1c;
      --brand: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    h1, h2 { margin: 0 0 10px 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }
    label { display: block; font-size: 13px; margin-bottom: 8px; }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
    }
    textarea { min-height: 130px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    button {
      cursor: pointer;
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1e3a8a;
      font-weight: 700;
    }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .hint {
      font-size: 13px;
      color: #475569;
      margin: 6px 0 0 0;
    }
    .ok { color: var(--ok); font-weight: 700; }
    .err { color: var(--err); font-weight: 700; }
    .log {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .log th, .log td {
      border: 1px solid #e2e8f0;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1>Google ?交? / Email ???皜祈岫</h1>
      <p class="hint">????亙??Apps Script Web App嚗葫閰?`createEvent / sendEmail / deleteEvent` ?臬???舐??/p>
      <div class="row">
        <label>Apps Script Web App URL
          <input id="api-url" type="text" placeholder="https://script.google.com/macros/s/.../exec">
        </label>
        <label>皜祈岫?嗡辣鈭?Email
          <input id="email-to" type="email" placeholder="you@example.com">
        </label>
      </div>
      <div class="toolbar">
        <button id="load-config-btn" type="button">頛皜祈岫閮剖? URL</button>
        <button id="ping-btn" type="button">皜祈岫???</button>
        <button id="run-all-btn" class="primary" type="button">銝?菔?摰皜祈岫</button>
      </div>
      <p class="hint" id="summary-text">撠?瑁?皜祈岫??/p>
    </section>

    <section class="card">
      <h2>皜祈岫?</h2>
      <div class="row">
        <label>?桀?撱箇???隞?ID嚗reateEvent ??敺??芸?憛怠嚗?          <input id="event-id" type="text" placeholder="event id">
        </label>
        <label>隤脩?????嚗SO嚗?          <input id="start-at" type="text" value="2026-04-20T10:00:00.000Z">
        </label>
      </div>
      <label>?芾? Payload嚗SON嚗蝺刻摩嚗?        <textarea id="payload-editor"></textarea>
      </label>
      <div class="toolbar">
        <select id="action-select">
          <option value="createEvent">createEvent</option>
          <option value="sendEmail">sendEmail</option>
          <option value="deleteEvent">deleteEvent</option>
          <option value="bootstrap">bootstrap</option>
        </select>
        <button id="apply-template-btn" type="button">頛閰脣?雿?閮?Payload</button>
        <button id="run-custom-btn" type="button">?瑁??桀? Payload</button>
      </div>
    </section>

    <section class="card">
      <h2>?瑁?閮?</h2>
      <table class="log">
        <thead>
          <tr><th>??</th><th>??</th><th>蝯?</th><th>閮</th></tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </section>
  </main>

  <script src="config.js?v=20260425-0009"></script>
  <script>
    (function () {
      const el = {
        apiUrl: document.getElementById("api-url"),
        emailTo: document.getElementById("email-to"),
        eventId: document.getElementById("event-id"),
        startAt: document.getElementById("start-at"),
        payloadEditor: document.getElementById("payload-editor"),
        actionSelect: document.getElementById("action-select"),
        summaryText: document.getElementById("summary-text"),
        logBody: document.getElementById("log-body"),
        loadConfigBtn: document.getElementById("load-config-btn"),
        pingBtn: document.getElementById("ping-btn"),
        runAllBtn: document.getElementById("run-all-btn"),
        applyTemplateBtn: document.getElementById("apply-template-btn"),
        runCustomBtn: document.getElementById("run-custom-btn")
      };

      function nowText() {
        const d = new Date();
        return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
      }

      function pushLog(action, ok, message) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${nowText()}</td>
          <td>${action}</td>
          <td class="${ok ? "ok" : "err"}">${ok ? "??" : "憭望?"}</td>
          <td>${String(message || "").replace(/</g, "&lt;")}</td>
        `;
        el.logBody.prepend(row);
      }

      function getApiUrl() {
        return String(el.apiUrl.value || "").trim();
      }

      function buildTemplate(action) {
        const startAt = String(el.startAt.value || new Date().toISOString()).trim();
        const endAt = new Date(new Date(startAt).getTime() + 60 * 60 * 1000).toISOString();
        const eventId = String(el.eventId.value || "").trim();
        const to = String(el.emailTo.value || "").trim();
        if (action === "createEvent") {
          return {
            lessonId: "TEST_LESSON_001",
            eventId,
            title: "?游?皜祈岫隤脩? STU001/CH001",
            startAt,
            endAt,
            studentCode: "STU001",
            studentName: "皜祈岫摮貊?",
            coachCode: "CH001",
            coachName: "皜祈岫?毀",
            sourceType: "REGULAR",
            reason: "integration-test"
          };
        }
        if (action === "deleteEvent") {
          return {
            lessonId: "TEST_LESSON_001",
            eventId,
            title: "?游?皜祈岫隤脩? STU001/CH001",
            startAt,
            endAt,
            studentCode: "STU001",
            studentName: "皜祈岫摮貊?",
            coachCode: "CH001",
            coachName: "皜祈岫?毀",
            sourceType: "REGULAR",
            reason: "integration-test-cleanup"
          };
        }
        if (action === "sendEmail") {
          return {
            template: "integration_test",
            to,
            studentCode: "STU001",
            studentName: "皜祈岫摮貊?",
            coachCode: "CH001",
            coachName: "皜祈岫?毀",
            when: startAt
          };
        }
        return {};
      }

      function writePayloadTemplate() {
        const action = el.actionSelect.value;
        const payload = buildTemplate(action);
        el.payloadEditor.value = JSON.stringify(payload, null, 2);
      }

      async function callApi(action, payload) {
        const url = getApiUrl();
        if (!url) {
          throw new Error("隢?憛?Apps Script URL");
        }
        if (!/\/exec(\?|$)/.test(url)) {
          throw new Error("Apps Script URL ?絲靘???Web App ?瑁?蝬脣?嚗虜?隞?/exec 蝯偏嚗?);
        }
        const response = await fetch(url, {
          method: "POST",
          cache: "no-store",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify({ action, ...payload, _ts: Date.now() })
        });
        const rawText = await response.text();
        let json = null;
        try {
          json = rawText ? JSON.parse(rawText) : {};
        } catch (error) {
          const preview = String(rawText || "").slice(0, 180);
          throw new Error(`????JSON嚗TTP ${response.status}嚗?賣?函蔡甈???URL ?航炊????畾蛛?${preview}`);
        }
        if (!response.ok || json?.ok === false) {
          throw new Error(`${json?.message || `${action} 憭望?`}嚗TTP ${response.status}嚗);
        }
        return json;
      }

      async function runCustom() {
        const action = el.actionSelect.value;
        let payload = {};
        try {
          payload = JSON.parse(el.payloadEditor.value || "{}");
        } catch (error) {
          pushLog(action, false, `JSON ?澆??航炊嚗?{error.message}`);
          return;
        }
        try {
          const result = await callApi(action, payload);
          if (action === "createEvent" && (result.eventId || result.calendarEventId)) {
            el.eventId.value = result.eventId || result.calendarEventId;
          }
          pushLog(action, true, JSON.stringify(result));
        } catch (error) {
          pushLog(action, false, error.message || "?芰?航炊");
        }
      }

      async function runPing() {
        try {
          const result = await callApi("bootstrap", {});
          pushLog("bootstrap", true, "?????");
          el.summaryText.innerHTML = "<span class='ok'>?????嚗??皜祈岫 createEvent/sendEmail/deleteEvent??/span>";
          return result;
        } catch (error) {
          const message = error.message || "?芰?航炊";
          pushLog("bootstrap", false, message);
          el.summaryText.innerHTML = `<span class='err'>???憭望?嚗?{String(message).replace(/</g, "&lt;")}</span>`;
          throw error;
        }
      }

      async function runAll() {
        el.summaryText.textContent = "?瑁?銝?..";
        try {
          await runPing();
          const createPayload = buildTemplate("createEvent");
          const createResult = await callApi("createEvent", createPayload);
          const createdEventId = createResult.eventId || createResult.calendarEventId || "";
          if (createdEventId) {
            el.eventId.value = createdEventId;
          }
          pushLog("createEvent", true, JSON.stringify(createResult));

          const emailPayload = buildTemplate("sendEmail");
          const emailResult = await callApi("sendEmail", emailPayload);
          pushLog("sendEmail", true, JSON.stringify(emailResult));

          const deletePayload = buildTemplate("deleteEvent");
          const deleteResult = await callApi("deleteEvent", deletePayload);
          pushLog("deleteEvent", true, JSON.stringify(deleteResult));

          el.summaryText.innerHTML = "<span class='ok'>摰皜祈岫??嚗reateEvent?endEmail?eleteEvent ?賢??單???/span>";
        } catch (error) {
          const message = error.message || "?芰?航炊";
          pushLog("runAll", false, message);
          el.summaryText.innerHTML = `<span class='err'>摰皜祈岫憭望?嚗?{String(message).replace(/</g, "&lt;")}</span>`;
        }
      }

      el.loadConfigBtn.addEventListener("click", () => {
        const url = String(window.APP_CONFIG?.appsScriptUrl || "").trim();
        el.apiUrl.value = url;
        el.summaryText.textContent = url ? "撌脰???config.leave-test.js URL?? : "config.leave-test.js ?桀?瘝? appsScriptUrl??;
      });
      el.pingBtn.addEventListener("click", runPing);
      el.runAllBtn.addEventListener("click", runAll);
      el.applyTemplateBtn.addEventListener("click", writePayloadTemplate);
      el.runCustomBtn.addEventListener("click", runCustom);
      el.actionSelect.addEventListener("change", writePayloadTemplate);

      if (window.APP_CONFIG?.appsScriptUrl) {
        el.apiUrl.value = String(window.APP_CONFIG.appsScriptUrl).trim();
      }
      writePayloadTemplate();
    })();
  </script>
</body>
</html>
