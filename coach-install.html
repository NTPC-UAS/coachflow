<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c2410c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CoachFlow教練">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="coach-pwa.webmanifest?v=20260503-0013">
  <link rel="icon" href="coachflow-coach-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="coachflow-coach-icon-192.png">
  <title>安裝 CoachFlow 教練版</title>
  <style>
    :root {
      --brand: #c2410c;
      --brand-dark: #9a3412;
      --ink: #172033;
      --muted: #64748b;
      --line: #fed7aa;
      --panel: #fffaf5;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(254, 215, 170, 0.95), transparent 24rem),
        linear-gradient(160deg, #fffaf5 0%, #ffffff 48%, #ffedd5 100%);
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
    }
    .install-card {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px rgba(154, 52, 18, 0.16);
      padding: 24px;
    }
    .app-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .app-icon {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(154, 52, 18, 0.22);
      flex: 0 0 auto;
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 9vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .copy {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }
    button,
    .button {
      width: 100%;
      min-height: 52px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 16px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }
    .primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }
    .install-help {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 14px;
    }
    .install-help h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .install-help ol {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
      line-height: 1.75;
    }
    .status {
      margin-top: 14px;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 700;
    }
    @media (max-width: 520px) {
      .install-card {
        padding: 20px;
        border-radius: 16px;
      }
      .app-head {
        align-items: flex-start;
      }
      .app-icon {
        width: 70px;
        height: 70px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="install-card">
      <div class="app-head">
        <img class="app-icon" src="coachflow-coach-icon.svg" alt="CoachFlow 教練版">
        <div>
          <p class="eyebrow">CoachFlow 手機版</p>
          <h1>安裝教練版</h1>
        </div>
      </div>
      <p class="copy">把教練端加到手機主畫面後，可以像一般 App 一樣開啟請假、補課、扣堂與繳費面板。</p>
      <div class="actions">
        <button class="primary" id="install-btn" type="button" hidden>安裝到手機</button>
        <a class="button" href="leave-coach-sandbox.html?v=20260503-0013&source=coach-install">開啟教練版</a>
      </div>
      <div class="install-help" id="install-help">
        <h2>手機安裝方式</h2>
        <ol>
          <li>Android Chrome：點上方「安裝到手機」，或從瀏覽器選單選「安裝應用程式」。</li>
          <li>iPhone Safari：點分享按鈕，選「加入主畫面」。</li>
        </ol>
      </div>
      <div class="status" id="install-status">正在準備安裝功能...</div>
    </section>
  </main>
  <script>
    const version = "20260503-0013";
    let deferredPrompt = null;
    const installBtn = document.getElementById("install-btn");
    const installStatus = document.getElementById("install-status");
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./coach-pwa-sw.js?v=" + version).catch((error) => {
          console.warn("CoachFlow coach PWA registration failed:", error);
        });
      });
    }

    if (isStandalone) {
      installStatus.textContent = "已用 App 模式開啟。";
    } else {
      installStatus.textContent = "Android 會在符合條件時顯示安裝按鈕；iPhone 請使用 Safari 分享選單。";
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.hidden = false;
      installStatus.textContent = "可以安裝到手機主畫面。";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        installStatus.textContent = "請使用瀏覽器選單加入主畫面。";
        return;
      }
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
      installStatus.textContent = choice.outcome === "accepted" ? "已送出安裝。" : "尚未安裝，可稍後再試。";
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      installStatus.textContent = "CoachFlow 教練版已安裝。";
    });
  </script>
</body>
</html>
