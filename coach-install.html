<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c2410c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CoachFlow教練">
  <link rel="manifest" href="coach-pwa.webmanifest?v=20260502-0006">
  <link rel="icon" href="coachflow-coach-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="coachflow-coach-icon-192.png">
  <title>安裝 CoachFlow 教練端</title>
  <style>
    :root { --brand:#c2410c; --ink:#1f2a37; --muted:#64748b; --line:#fed7aa; --bg:#fffaf5; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Noto Sans TC", system-ui, sans-serif; color:var(--ink); background:radial-gradient(circle at 20% 0%, #ffedd5, transparent 32rem), linear-gradient(160deg, #fffaf5, #fff7ed 45%, #fed7aa); }
    main { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(520px, 100%); border:1px solid var(--line); border-radius:28px; background:rgba(255,250,245,.88); box-shadow:0 24px 70px rgba(124,45,18,.18); padding:28px; }
    .icon { width:86px; height:86px; border-radius:24px; box-shadow:0 14px 34px rgba(124,45,18,.22); }
    h1 { margin:18px 0 8px; font-size:clamp(28px, 8vw, 42px); line-height:1.08; }
    p { color:var(--muted); line-height:1.7; margin:8px 0; }
    .actions { display:grid; gap:12px; margin-top:22px; }
    button, a.button { width:100%; border:1px solid #c6cfdd; border-radius:16px; padding:14px 16px; font:inherit; font-weight:800; text-align:center; text-decoration:none; color:var(--ink); background:#fff; }
    .primary { border-color:var(--brand); background:var(--brand); color:#fff; }
    .tips { margin-top:20px; padding:14px; border-radius:18px; background:#fff7ed; border:1px solid var(--line); }
    ol { margin:8px 0 0 22px; padding:0; color:var(--muted); line-height:1.75; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <img class="icon" src="coachflow-coach-icon.svg" alt="CoachFlow 教練端">
      <h1>安裝 CoachFlow 教練端</h1>
      <p>安裝後手機主畫面會出現 CoachFlow 教練端，打開會直接進入教練請假 / 補課月曆。</p>
      <div class="actions">
        <button class="primary" id="install-btn" type="button" hidden>安裝到手機</button>
        <a class="button" href="leave-coach-sandbox.html?v=20260502-0006&source=coach-install">開啟教練請假系統</a>
      </div>
      <div class="tips">
        <strong>如果沒有出現安裝按鈕</strong>
        <ol>
          <li>Android Chrome：右上角選單，點「安裝應用程式」或「加到主畫面」。</li>
          <li>iPhone Safari：按分享，選「加入主畫面」。</li>
        </ol>
      </div>
    </section>
  </main>
  <script>
    const version = "20260502-0006";
    let deferredPrompt = null;
    const installBtn = document.getElementById("install-btn");
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./coach-pwa-sw.js?v=" + version).catch((error) => {
          console.warn("CoachFlow coach PWA registration failed:", error);
        });
      });
    }
    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.hidden = false;
    });
    installBtn?.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });
  </script>
</body>
</html>
